name: Atualização automática do README 🕒

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:     

jobs:
  update-readme:
    name: Atualizar README automaticamente
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      
      - name: Atualizar log (sem alterar README)
        run: |
          echo "🕒 Última atualização automática: $(date -u)" > update_log.txt

      - name: Commit e push das mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add update_log.txt || true
          git commit -m "Atualização automática do log [$(date -u)]" || echo "Nenhuma alteração detectada"
          git push
