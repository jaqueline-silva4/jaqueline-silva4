name: Atualização automática das métricas do perfil

on:
  schedule:
    - cron: "0 */12 * * *"   # Atualiza a cada 12 horas
  workflow_dispatch:          # Permite rodar manualmente

jobs:
  update:
    name: Gerar métricas do perfil
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout
      - name: Checkout
        uses: actions/checkout@v3

      # 2) Gerar métricas completas
      - name: Gerar métricas
        uses: lowlighter/metrics@latest
        with:
          filename: dist/metrics.svg
          token: ${{ secrets.GITHUB_TOKEN }}

          base: repositories
          base_indepth: yes

          plugin_languages: yes
          plugin_languages_limit: 10
          plugin_languages.sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_ignored: >-
            Makefile

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # 3) Publicar no branch output
      - name: Publicar métricas no branch output
        uses: crazy-max/ghaction-github-pages@v2.6.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
